# PERFF-seq
- id: Led by <a href="https://clareaulab.com/members/tsion-abay.html">Tsion</a> with <a href="https://satpathylab.com/">Satpathy Lab</a> and <a href="https://www.mskcc.org/research/ski/innovation-labs/single-cell-analytics-innovation-lab-sail">SAIL</a>
  title: <b>Programmable Enrichment via RNA FlowFISH by sequencing</b>
  authors: 
  - PERFF-seq is new workflow for studying rare cell types via nucleic acid cytometry upstream of scRNA-seq. Our resources highlight code to reproduce downstream analyses of PERFF-seq data as well as step-by-step protocols for performing your own experiment. 
